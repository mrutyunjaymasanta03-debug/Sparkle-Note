services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8080"
      MONGODB_URI: mongodb://mongodb:27017
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: artifacts/sparkle-note-hub/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-server

volumes:
  mongodb_data:
